<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RuChat - Диагностика</title>
    <style>
        body {
            font-family: monospace;
            background: #0f172a;
            color: #fff;
            padding: 20px;
        }
        .ok { color: #4ade80; }
        .error { color: #ef4444; }
        .warn { color: #f59e0b; }
        pre { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #0088cc;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #00b4ff; }
    </style>
</head>
<body>
    <h1>🔍 RuChat - Диагностика функций</h1>
    
    <h2>Проверка функций:</h2>
    <div id="functions"></div>
    
    <h2>Проверка DOM элементов:</h2>
    <div id="dom"></div>
    
    <h2>Firebase:</h2>
    <div id="firebase"></div>
    
    <h2>Действия:</h2>
    <button onclick="testStories()">Тест историй</button>
    <button onclick="testLocation()">Тест геолокации</button>
    <button onclick="testPoll()">Тест опроса</button>
    <button onclick="reload()">Перезагрузить</button>
    
    <pre id="log"></pre>

    <script>
        function log(msg, type = '') {
            const el = document.getElementById('log');
            el.innerHTML += `<div class="${type}">${msg}</div>`;
            console.log(msg);
        }
        
        function checkFunction(name) {
            const exists = typeof window[name] === 'function';
            return `<span class="${exists ? 'ok' : 'error'}">${exists ? '✅' : '❌'} ${name}</span>`;
        }
        
        function checkElement(id) {
            const exists = document.getElementById(id) !== null;
            return `<span class="${exists ? 'ok' : 'error'}">${exists ? '✅' : '❌'} #${id}</span>`;
        }
        
        async function testStories() {
            log('Тест историй...', 'warn');
            try {
                if (typeof loadStoriesForSidebar === 'function') {
                    loadStoriesForSidebar();
                    log('✅ Функция вызвана', 'ok');
                } else {
                    log('❌ Функция не найдена', 'error');
                }
            } catch (e) {
                log('Ошибка: ' + e.message, 'error');
            }
        }
        
        function testLocation() {
            log('Тест геолокации...', 'warn');
            if (typeof sendLocation === 'function') {
                sendLocation();
                log('✅ Геолокация запущена', 'ok');
            } else {
                log('❌ Функция не найдена', 'error');
            }
        }
        
        function testPoll() {
            log('Тест опроса...', 'warn');
            if (typeof showCreatePollModal === 'function') {
                showCreatePollModal();
                log('✅ Опрос создан', 'ok');
            } else {
                log('❌ Функция не найдена', 'error');
            }
        }
        
        function reload() {
            window.location.reload();
        }
        
        // Проверка при загрузке
        window.addEventListener('load', () => {
            setTimeout(() => {
                // Проверка функций
                const functions = [
                    'showCreateStoryModal',
                    'viewUserStories',
                    'loadStoriesForSidebar',
                    'sendLocation',
                    'showAlbumCreator',
                    'showVideoMessageRecorder',
                    'showCreatePollModal',
                    'startSecretChat',
                    'showDeviceSessionsModal'
                ];
                
                let html = '<div>';
                functions.forEach(fn => {
                    html += checkFunction(fn) + '<br>';
                });
                html += '</div>';
                document.getElementById('functions').innerHTML = html;
                
                // Проверка DOM
                const elements = [
                    'storiesContainer',
                    'storiesList',
                    'chatFoldersContainer',
                    'friendList',
                    'groupList',
                    'mobileChatActionsBar'
                ];
                
                html = '<div>';
                elements.forEach(id => {
                    html += checkElement(id) + '<br>';
                });
                html += '</div>';
                document.getElementById('dom').innerHTML = html;
                
                // Проверка Firebase
                html = '<div>';
                if (typeof db !== 'undefined') {
                    html += '<span class="ok">✅ Firebase подключен</span><br>';
                    try {
                        db.ref('storiesIndex').once('value')
                            .then(snap => {
                                log(`Firebase: историй = ${snap.numChildren()}`, 'ok');
                            })
                            .catch(e => log('Firebase ошибка: ' + e.message, 'error'));
                    } catch (e) {
                        log('Firebase ошибка: ' + e.message, 'error');
                    }
                } else {
                    html += '<span class="error">❌ Firebase не подключен</span><br>';
                }
                html += '</div>';
                document.getElementById('firebase').innerHTML = html;
                
                log('Диагностика завершена', 'ok');
            }, 1000);
        });
    </script>
</body>
</html>
