<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuChat - ТЕСТ ФУНКЦИЙ</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .test { background: rgba(255,255,255,0.1); padding: 15px; margin: 10px 0; border-radius: 8px; }
        .ok { color: #4ade80; font-weight: bold; }
        .error { color: #ef4444; font-weight: bold; }
        button { padding: 10px 20px; margin: 5px; background: #0088cc; border: none; color: white; border-radius: 8px; cursor: pointer; font-size: 14px; }
        button:hover { background: #00b4ff; }
        pre { background: #000; padding: 10px; overflow: auto; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🧪 RuChat - ТЕСТ ВСЕХ ФУНКЦИЙ</h1>
    
    <div class="test">
        <h2>1. Проверка функций:</h2>
        <div id="functions"></div>
    </div>
    
    <div class="test">
        <h2>2. Проверка элементов:</h2>
        <div id="elements"></div>
    </div>
    
    <div class="test">
        <h2>3. Тест кнопок:</h2>
        <button onclick="testStory()">📖 Тест историй</button>
        <button onclick="testLocation()">📍 Тест геолокации</button>
        <button onclick="testAlbum()">🖼️ Тест альбома</button>
        <button onclick="testVideo()">🎬 Тест видео</button>
        <button onclick="testPoll()">📊 Тест опроса</button>
        <button onclick="testSecret()">🔒 Тест секретного чата</button>
        <button onclick="testSessions()">🔐 Тест сессий</button>
    </div>
    
    <div class="test">
        <h2>4. Лог:</h2>
        <pre id="log">Ожидание...</pre>
    </div>
    
    <button onclick="window.location.href='index.html'" style="font-size: 16px; padding: 15px 30px; background: #22c55e;">ОТКРЫТЬ INDEX.HTML</button>
    
    <script>
        function log(msg) {
            document.getElementById('log').textContent += msg + '\n';
            console.log(msg);
        }
        
        function checkFunction(name) {
            const exists = typeof window[name] === 'function';
            return `<span class="${exists ? 'ok' : 'error'}">${exists ? '✅' : '❌'} ${name}</span><br>`;
        }
        
        function checkElement(id) {
            const exists = document.getElementById(id) !== null;
            return `<span class="${exists ? 'ok' : 'error'}">${exists ? '✅' : '❌'} #${id}</span><br>`;
        }
        
        function testStory() {
            log('Тест историй...');
            if (typeof window.showCreateStoryModal === 'function') {
                window.showCreateStoryModal();
                log('✅ История: ОК');
            } else log('❌ Функция не найдена');
        }
        
        function testLocation() {
            log('Тест геолокации...');
            if (typeof window.sendLocation === 'function') {
                window.sendLocation();
                log('✅ Геолокация: ОК');
            } else log('❌ Функция не найдена');
        }
        
        function testAlbum() {
            log('Тест альбома...');
            if (typeof window.showAlbumCreator === 'function') {
                window.showAlbumCreator();
                log('✅ Альбом: ОК');
            } else log('❌ Функция не найдена');
        }
        
        function testVideo() {
            log('Тест видео...');
            if (typeof window.showVideoMessageRecorder === 'function') {
                window.showVideoMessageRecorder();
                log('✅ Видео: ОК');
            } else log('❌ Функция не найдена');
        }
        
        function testPoll() {
            log('Тест опроса...');
            if (typeof window.showCreatePollModal === 'function') {
                window.showCreatePollModal();
                log('✅ Опрос: ОК');
            } else log('❌ Функция не найдена');
        }
        
        function testSecret() {
            log('Тест секретного чата...');
            if (typeof window.startSecretChat === 'function') {
                window.startSecretChat();
                log('✅ Секретный чат: ОК');
            } else log('❌ Функция не найдена');
        }
        
        function testSessions() {
            log('Тест сессий...');
            if (typeof window.showDeviceSessionsModal === 'function') {
                window.showDeviceSessionsModal();
                log('✅ Сессии: ОК');
            } else log('❌ Функция не найдена');
        }
        
        // Автопроверка при загрузке
        window.addEventListener('load', () => {
            setTimeout(() => {
                log('=== НАЧАЛО ПРОВЕРКИ ===');
                
                // Функции
                const functions = [
                    'showCreateStoryModal', 'viewUserStories', 'loadStoriesForSidebar',
                    'sendLocation', 'showAlbumCreator', 'showVideoMessageRecorder',
                    'showCreatePollModal', 'startSecretChat', 'showDeviceSessionsModal',
                    'showSavedMessagesModal', 'showArchivedChatsModal', 'setChatFolder'
                ];
                
                let html = '';
                functions.forEach(fn => {
                    html += checkFunction(fn);
                });
                document.getElementById('functions').innerHTML = html;
                
                // Элементы
                const elements = [
                    'storiesContainer', 'storiesList', 'chatFoldersContainer',
                    'friendList', 'groupList', 'mobileChatActionsBar'
                ];
                
                html = '';
                elements.forEach(id => {
                    html += checkElement(id);
                });
                document.getElementById('elements').innerHTML = html;
                
                log('=== ПРОВЕРКА ЗАВЕРШЕНА ===');
                log('Откройте index.html для полноценной работы');
            }, 500);
        });
    </script>
</body>
</html>
